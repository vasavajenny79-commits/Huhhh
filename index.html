<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Marry Me, Patel? 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div id="proposalScreen" class="container">
        <h1 id="mainTitle">Will You Marry Me, Patel? 💖</h1>
        <p class="sub">Will you make me a Patel too? 🥺💍</p>

        <div class="bunny-card">
            <img id="displayBunny" src="shy.gif" class="bunny-img">
        </div>

        <div class="buttons">
            <button id="yesBtn">Yes 💕</button>
            <button id="noBtn">No 😢</button>
        </div>
    </div>

    <div id="celebrationScreen" class="container" style="display:none;">
        <h1>I KNEW YOU WOULD SAY YES! 💖</h1>
        <p class="sub">You've made me the happiest person ever! 💕</p>
        
        <div class="bunny-row">
            <img src="celebrate.gif" class="celebrate-bunny">
        </div>
        <div class="kiss-row">
            <img src="kisses.gif" class="kisses-bunny">
        </div>

        <div class="emojis">💋😘💌💍</div>
    </div>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
